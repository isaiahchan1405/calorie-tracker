<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>MealLogger | Login</title>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <main class="container">
        <article style="text-align: center;">
            <h1 style="color: #0b2a5b;">MealLogger</h1>
            <p>Track your daily nutrition and achieve your health goals.</p>
            <button type="button" class="primary-btn" onclick="firebaseLogin()" style="width: 100%;">
                Sign in with Google
            </button>
        </article>
    </main>

    <!-- Firebase SDK CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    
    <!-- Initialize Firebase -->
        <script src="firebase-init.js"></script>
        <script>
            // Always sign out when visiting the login page to ensure a clean state
            firebase.auth().signOut().catch(() => {});
        </script>
        <script src="firebase-auth.js"></script>
</body>
</html>
